<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Perfumes | Luxury Fragrances</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">AURA</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
            </ul>
        </nav>
        <div class="auth-cart">
            <span id="user-greeting" style="display: none; font-weight: bold; color: var(--color-gold);"></span>
            <a href="login.html" class="btn btn-outline" id="login-btn">Login</a>
            <a href="cart.html" class="btn btn-primary">Cart (<span id="cart-count">0</span>)</a>
            <button onclick="logout()" id="logout-btn" style="display:none;" class="btn btn-outline">Logout</button>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Discover Your Signature Scent</h1>
            <p>Exclusive collection of luxury perfumes crafted for elegance.</p>
            <a href="products.html" class="btn btn-primary">Shop Now</a>
        </div>
    </section>

    <section class="trending">
        <h2 class="section-title">Trending Now</h2>
        <div class="products-grid" id="trending-container">
            <!-- Products will be injected here via JS -->
        </div>
    </section>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadTrendingProducts();
            updateAuthUI();
            updateCartCount();
        });
    </script>
</body>
</html>
