<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Aura Perfumes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">AURA</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
            </ul>
        </nav>
        <div class="auth-cart">
            <span id="user-greeting" style="display: none; font-weight: bold; color: var(--color-gold);"></span>
            <a href="login.html" class="btn btn-outline" id="login-btn">Login</a>
            <a href="cart.html" class="btn btn-primary">Cart (<span id="cart-count">0</span>)</a>
            <button onclick="logout()" id="logout-btn" style="display:none;" class="btn btn-outline">Logout</button>
        </div>
    </header>

    <section>
        <h2 class="section-title">Your Shopping Cart</h2>
        <div id="cart-items" style="max-width: 800px; margin: 0 auto; background: var(--color-pink); padding: 2rem; border-radius: 8px;">
            <!-- Cart items go here -->
        </div>
        
        <div style="max-width: 800px; margin: 2rem auto; display: flex; justify-content: space-between; align-items: center;">
            <div class="cart-total">Total: $<span id="cart-total-price">0.00</span></div>
            <button class="btn btn-primary" onclick="placeOrder()">Place Order</button>
        </div>
    </section>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
            updateAuthUI();
            updateCartCount();
        });
    </script>
</body>
</html>
