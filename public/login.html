<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Signup | Aura Perfumes</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .tabs { display: flex; justify-content: center; gap: 1rem; margin-bottom: 2rem;}
        .tab { background: none; border: none; font-size: 1.2rem; cursor: pointer; font-family: var(--font-heading); color: #ccc;}
        .tab.active { color: var(--color-gold); border-bottom: 2px solid var(--color-gold); }
    </style>
</head>
<body>
    <header>
        <div class="logo">AURA</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
            </ul>
        </nav>
    </header>

    <div class="form-container">
        <div class="tabs">
            <button class="tab active" id="tab-login" onclick="toggleAuth('login')">Login</button>
            <button class="tab" id="tab-register" onclick="toggleAuth('register')">Register</button>
        </div>

        <form id="auth-form" onsubmit="handleAuth(event)">
            <div class="form-group" id="name-group" style="display:none;">
                <label>Name</label>
                <input type="text" id="name" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%" id="auth-submit">Login</button>
        </form>
    </div>

    <script src="js/app.js"></script>
    <script>
        let mode = 'login';
        
        function toggleAuth(newMode) {
            mode = newMode;
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-register').classList.toggle('active', mode === 'register');
            document.getElementById('name-group').style.display = mode === 'register' ? 'block' : 'none';
            document.getElementById('auth-submit').innerText = mode === 'login' ? 'Login' : 'Register';
            
            if(mode === 'register') {
                document.getElementById('name').setAttribute('required', 'true');
            } else {
                document.getElementById('name').removeAttribute('required');
            }
        }

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (mode === 'login') {
                const res = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if(res.ok) {
                    setToken(data.token, data.user);
                    window.location.href = 'index.html';
                } else {
                    alert(data.error);
                }
            } else {
                const name = document.getElementById('name').value;
                const res = await fetch('http://localhost:3000/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                if(res.ok) {
                    alert("Registration successful! Please login.");
                    toggleAuth('login');
                } else {
                    alert(data.error);
                }
            }
        }
    </script>
</body>
</html>
