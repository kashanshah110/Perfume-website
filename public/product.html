<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Aura Perfumes</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-detail-container { display: flex; flex-wrap: wrap; gap: 4rem; max-width: 1000px; margin: 0 auto; }
        .product-image { flex: 1; min-width: 300px; }
        .product-image img { width: 100%; border-radius: 8px; background: var(--color-pink); padding: 2rem; object-fit: contain; }
        .product-info { flex: 1; min-width: 300px; display: flex; flex-direction: column; justify-content: center; }
        .reviews { margin-top: 4rem; max-width: 1000px; margin-left: auto; margin-right: auto; }
        .review-card { background: var(--color-pink); padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <header>
        <div class="logo">AURA</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
            </ul>
        </nav>
        <div class="auth-cart">
            <span id="user-greeting" style="display: none; font-weight: bold; color: var(--color-gold);"></span>
            <a href="login.html" class="btn btn-outline" id="login-btn">Login</a>
            <a href="cart.html" class="btn btn-primary">Cart (<span id="cart-count">0</span>)</a>
            <button onclick="logout()" id="logout-btn" style="display:none;" class="btn btn-outline">Logout</button>
        </div>
    </header>

    <section>
        <div class="product-detail-container" id="product-detail">
            <p>Loading product...</p>
        </div>

        <div class="reviews">
            <h2 class="section-title">Customer Reviews</h2>
            <div class="review-card">
                <h4>⭐⭐⭐⭐⭐ - Sophia L.</h4>
                <p>"Absolutely amazing fragrance! Lasts all day long and feels so luxurious."</p>
            </div>
            <div class="review-card">
                <h4>⭐⭐⭐⭐ - James K.</h4>
                <p>"Very elegant scent, got numerous compliments."</p>
            </div>
        </div>
    </section>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            updateAuthUI();
            updateCartCount();
            
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if(!id) return;

            try {
                const res = await fetch(`${API_URL}/products/${id}`);
                const product = await res.json();
                
                const container = document.getElementById('product-detail');
                if(product.error) {
                    container.innerHTML = `<p>${product.error}</p>`;
                    return;
                }

                container.innerHTML = `
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/500'">
                    </div>
                    <div class="product-info">
                        <h1 style="font-family: var(--font-heading); font-size: 3rem; margin-bottom: 1rem;">${product.name}</h1>
                        <p style="font-size: 1.5rem; color: var(--color-gold); font-weight: bold; margin-bottom: 1rem;">$${product.price.toFixed(2)}</p>
                        <p style="margin-bottom: 2rem; font-size: 1.1rem; line-height: 1.8;">${product.description}</p>
                        <button class="btn btn-primary" style="padding: 1rem; font-size: 1.1rem;" onclick="addToCart(${product.id}, '${product.name}', ${product.price}, '${product.image}')">Add to Cart</button>
                    </div>
                `;
            } catch(e) {
                document.getElementById('product-detail').innerHTML = "<p>Error loading product</p>";
            }
        });
    </script>
</body>
</html>
