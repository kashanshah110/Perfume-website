<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Collection | Aura Perfumes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">AURA</div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Shop</a></li>
            </ul>
        </nav>
        <div class="auth-cart">
            <span id="user-greeting" style="display: none; font-weight: bold; color: var(--color-gold);"></span>
            <a href="login.html" class="btn btn-outline" id="login-btn">Login</a>
            <a href="cart.html" class="btn btn-primary">Cart (<span id="cart-count">0</span>)</a>
            <button onclick="logout()" id="logout-btn" style="display:none;" class="btn btn-outline">Logout</button>
        </div>
    </header>

    <section>
        <h2 class="section-title">Our Collection</h2>
        <div style="text-align: center; margin-bottom: 2rem;">
            <button class="btn btn-outline" onclick="loadAllProducts('All')">All</button>
            <button class="btn btn-outline" onclick="loadAllProducts('Men')">Men</button>
            <button class="btn btn-outline" onclick="loadAllProducts('Women')">Women</button>
            <button class="btn btn-outline" onclick="loadAllProducts('Unisex')">Unisex</button>
            
            <input type="text" id="search-input" placeholder="Search perfumes..." style="padding: 0.8rem; margin-left: 1rem; border: 1px solid var(--color-gold); border-radius: 4px;">
            <button class="btn btn-primary" onclick="loadAllProducts('All', document.getElementById('search-input').value)">Search</button>
        </div>
        <div class="products-grid" id="products-container">
            <!-- Dynamic inject -->
        </div>
    </section>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadAllProducts();
            updateAuthUI();
            updateCartCount();
        });
    </script>
</body>
</html>
